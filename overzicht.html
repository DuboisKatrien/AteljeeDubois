<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoulColor – Overzicht</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #F8D7E3 0%, #DCEBFF 100%);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: rgba(255, 255, 255, 0.85);
      padding: 30px;
      border-radius: 22px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.12);
      width: 90%;
      max-width: 500px;
    }

    h2, h3 {
      text-align: center;
      color: #4A4A4A;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      background: #E6D9FF;
      color: #4A4A4A;
      border: none;
      padding: 10px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.3s ease;
      font-weight: 500;
    }

    button:hover {
      background: #D4C4FF;
      transform: scale(1.05);
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .day {
      padding: 12px;
      background: #FFF4C7;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: 500;
      color: #4A4A4A;
    }

    .day:hover {
      background: #FFEFA8;
      transform: scale(1.05);
    }

    .day.hasEntry {
      background: #DFF8E1;
      font-weight: 600;
      color: #333;
      border: 2px solid #B8EFC0;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Overzicht 📅</h2>

    <div class="nav-buttons">
      <button onclick="window.location.href='dashboard.html'">⬅ Dashboard</button>
      <button onclick="window.location.href='dagboek.html'">📘 Dagboek</button>
    </div>

    <h3 id="monthTitle"></h3>
    <div class="calendar" id="calendar"></div>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem("loggedInUser"));
    const email = user.email;

    const calendar = document.getElementById("calendar");
    const monthTitle = document.getElementById("monthTitle");

    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth();

    const monthNames = [
      "januari","februari","maart","april","mei","juni",
      "juli","augustus","september","oktober","november","december"
    ];

    monthTitle.textContent = monthNames[month] + " " + year;

    function buildCalendar() {
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      const startOffset = (firstDay === 0 ? 6 : firstDay - 1);

      for (let i = 0; i < startOffset; i++) {
        calendar.appendChild(document.createElement("div"));
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
        const entry = localStorage.getItem("dagboek_" + email + "_" + dateStr);

        const div = document.createElement("div");
        div.classList.add("day");
        if (entry && entry.trim() !== "") {
          div.classList.add("hasEntry");
        }

        div.textContent = day;
        div.onclick = () => window.location.href = `dagboek.html?date=${dateStr}`;

        calendar.appendChild(div);
      }
    }

    buildCalendar();
  </script>

</body>
</html>
