<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dagboek Overzicht</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5ff;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    button {
      background: #4b6bff;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:active {
      background: #3b57d0;
    }
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      margin-top: 20px;
    }
    .day {
      padding: 12px;
      background: #eef0ff;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
    }
    .day.hasEntry {
      background: #c7d1ff;
      font-weight: bold;
    }
    .day:hover {
      background: #b8c4ff;
    }
    h2, h3 {
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Overzicht 📅</h2>

    <div style="display:flex; gap:10px; margin-bottom:15px;">
      <button onclick="window.location.href='dashboard.html'">⬅ Dashboard</button>
      <button onclick="window.location.href='dagboek.html'">📘 Dagboek</button>
    </div>

    <h3 id="monthTitle"></h3>
    <div class="calendar" id="calendar"></div>
  </div>

  <script>
    const calendar = document.getElementById("calendar");
    const monthTitle = document.getElementById("monthTitle");

    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth();

    const monthNames = [
      "januari","februari","maart","april","mei","juni",
      "juli","augustus","september","oktober","november","december"
    ];

    monthTitle.textContent = monthNames[month] + " " + year;

    function buildCalendar() {
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      const startOffset = (firstDay === 0 ? 6 : firstDay - 1);

      for (let i = 0; i < startOffset; i++) {
        calendar.appendChild(document.createElement("div"));
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
        const entry = localStorage.getItem("dagboek_" + dateStr);

        const div = document.createElement("div");
        div.classList.add("day");
        if (entry && entry.trim() !== "") {
          div.classList.add("hasEntry");
        }

        div.textContent = day;
        div.onclick = () => window.location.href = `dagboek.html?date=${dateStr}`;

        calendar.appendChild(div);
      }
    }

    buildCalendar();
  </script>

</body>
</html>
