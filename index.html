<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote van de Dag</title>

  <!-- Mooie Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #f8f9fc, #e8ecf5);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      transition: background-color 0.6s ease;
    }

    .card {
      background: white;
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      max-width: 650px;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 25px;
      color: #333;
      font-weight: 600;
    }

    #quote {
      font-size: 1.6rem;
      font-style: italic;
      color: #555;
      line-height: 1.5;
      margin-bottom: 30px;
    }

    #colorButton {
      padding: 14px 28px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      background: #6c63ff;
      color: white;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
      font-weight: 500;
    }

    #colorButton:hover {
      background: #574fe3;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Quote van de Dag</h1>
    <div id="quote">Laden...</div>
    <button id="colorButton">Verander stemming</button>
  </div>

  <script>
    // Quote van de dag laden
    fetch("quotes.json")
      .then(response => response.json())
      .then(data => {
        const quotes = data.quotes;
        const today = new Date();
        const index = today.getDate() % quotes.length;
        document.getElementById("quote").innerText = quotes[index];
      })
      .catch(() => {
        document.getElementById("quote").innerText = "Kon geen quote laden.";
      });

    // Emotiekleuren
    const moods = [
      { name: "Rust", color: "#A8DADC" },
      { name: "Energie", color: "#FFBE0B" },
      { name: "Liefde", color: "#FF006E" },
      { name: "Vrolijkheid", color: "#FFD166" },
      { name: "Focus", color: "#118AB2" },
      { name: "Creativiteit", color: "#9B5DE5" },
      { name: "Zachtheid", color: "#F7EDE2" },
      { name: "Kracht", color: "#06D6A0" }
    ];

    let moodIndex = 0;

    document.getElementById("colorButton").addEventListener("click", () => {
      const mood = moods[moodIndex];
      document.body.style.background = mood.color;
      document.getElementById("colorButton").innerText = "Stemming: " + mood.name;

      moodIndex = (moodIndex + 1) % moods.length;
    });
  </script>

</body>
</html>
