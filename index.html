<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote van de Dag</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      transition: background-image 0.8s ease-in-out;
    }

    .card {
      background: rgba(255, 255, 255, 0.85);
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      max-width: 650px;
      backdrop-filter: blur(6px);
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 25px;
      color: #333;
      font-weight: 600;
    }

    #quote {
      font-size: 1.6rem;
      font-style: italic;
      color: #444;
      line-height: 1.5;
      margin-bottom: 30px;
    }

    #moodButton {
      padding: 14px 28px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      background: #6c63ff;
      color: white;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
      font-weight: 500;
    }

    #moodButton:hover {
      background: #574fe3;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Quote van de Dag</h1>
    <div id="quote">Laden...</div>
    <button id="moodButton">Stemming: Blijdschap</button>
  </div>

  <script>
    // Quote van de dag laden
    fetch("quotes.json")
      .then(response => response.json())
      .then(data => {
        const quotes = data.quotes;
        const today = new Date();
        const index = today.getDate() % quotes.length;
        document.getElementById("quote").innerText = quotes[index];
      })
      .catch(() => {
        document.getElementById("quote").innerText = "Kon geen quote laden.";
      });

    // Emoties + lokale JPG-bestanden
    const moods = [
  { name: "Blijdschap", image: "https://raw.githubusercontent.com/DuboisKatrien/AteljeeDubois/main/Fotos_emoties/zon.jpg" },
  { name: "Verdriet", image: "https://raw.githubusercontent.com/DuboisKatrien/AteljeeDubois/main/Fotos_emoties/regen.jpg" },
  { name: "Angst", image: "https://raw.githubusercontent.com/DuboisKatrien/AteljeeDubois/main/Fotos_emoties/orkaan.jpg" },
  { name: "Boosheid", image: "https://raw.githubusercontent.com/DuboisKatrien/AteljeeDubois/main/Fotos_emoties/donder.jpg" },
  { name: "Walging", image: "https://raw.githubusercontent.com/DuboisKatrien/AteljeeDubois/main/Fotos_emoties/zandstorm.jpg" },
  { name: "Verrassing", image: "https://raw.githubusercontent.com/DuboisKatrien/AteljeeDubois/main/Fotos_emoties/regenboog.jpg" }
    ];

    let moodIndex = 0;

    // Start met eerste emotie
    document.body.style.backgroundImage = `url('${moods[0].image}')`;

    document.getElementById("moodButton").addEventListener("click", () => {
      moodIndex = (moodIndex + 1) % moods.length;
      const mood = moods[moodIndex];
      document.body.style.backgroundImage = `url('${mood.image}')`;
      document.getElementById("moodButton").innerText = "Stemming: " + mood.name;
    });
  </script>

</body>
</html>
