<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote van de Dag</title>
  <style>
    body {
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #5ff9f2;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      max-width: 600px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
      color: #333;
    }

    #quote {
      font-size: 1.5rem;
      font-style: italic;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Quote van de Dag</h1>
    <div id="quote">Laden...</div>
  </div>

  <script>
    fetch("quotes.json")
      .then(response => response.json())
      .then(data => {
        const quotes = data.quotes;
        const today = new Date();
        const index = today.getDate() % quotes.length;
        document.getElementById("quote").innerText = quotes[index];
      })
      .catch(() => {
        document.getElementById("quote").innerText = "Kon geen quote laden.";
      });
  </script>

</body>
</html>
