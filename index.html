<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoulColor – Aanmelden</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Poppins", sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #C8F3D6, #FDE2FF);
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 4px 25px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    h2 {
      margin-bottom: 20px;
      font-weight: 600;
      color: #4A4A4A;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #C8F3D6;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      background: #B3EAC5;
      transform: scale(1.03);
    }

    a {
      display: block;
      margin-top: 15px;
      color: #4A4A4A;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Aanmelden</h2>

    <form id="loginForm">
      <input type="email" id="email" placeholder="E-mail" required>
      <input type="password" id="password" placeholder="Wachtwoord" required>
      <button type="submit">Aanmelden</button>
    </form>

    <a href="register.html">Nog geen account? Registreren</a>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(event) {
      event.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      const users = JSON.parse(localStorage.getItem("users")) || [];
      const user = users.find(user => user.email === email && user.password === password);

      if (!user) {
        alert("E-mail of wachtwoord is onjuist.");
        return;
      }

      // Gebruiker opslaan als ingelogd
      localStorage.setItem("loggedInUser", JSON.stringify(user));

      // Doorsturen naar dashboard
      window.location.href = "dashboard.html";
    });
  </script>

</body>
</html>
