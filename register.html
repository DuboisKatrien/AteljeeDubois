<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoulColor – Registreren</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Poppins", sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #FDE2FF, #C8F3D6);
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 4px 25px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    h2 {
      margin-bottom: 20px;
      font-weight: 600;
      color: #4A4A4A;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #C8F3D6;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      background: #B3EAC5;
      transform: scale(1.03);
    }

    a {
      display: block;
      margin-top: 15px;
      color: #4A4A4A;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Registreren</h2>

    <form id="registerForm">
      <input type="email" id="email" placeholder="E-mail" required>
      <input type="password" id="password" placeholder="Wachtwoord" required>
      <button type="submit">Maak account</button>
    </form>

    <a href="login.html">Al een account? Aanmelden</a>
  </div>

  <script>
    document.getElementById("registerForm").addEventListener("submit", function(event) {
      event.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Vul alle velden in.");
        return;
      }

      const users = JSON.parse(localStorage.getItem("users")) || [];
      const userExists = users.some(user => user.email === email);

      if (userExists) {
        alert("Deze gebruiker bestaat al.");
        return;
      }

      users.push({ email, password });
      localStorage.setItem("users", JSON.stringify(users));

      alert("Registratie geslaagd! Je wordt doorgestuurd naar de loginpagina.");

      // ⭐ Nieuwe veilige redirect
      setTimeout(() => {
        fetch("login.html")
          .then(response => {
            if (response.ok) {
              window.location.href = "login.html";
            } else {
              alert("Loginpagina nog niet beschikbaar. Probeer over enkele seconden opnieuw.");
            }
          })
          .catch(() => {
            alert("Er ging iets mis. Probeer opnieuw.");
          });
      }, 800);
    });
  </script>

</body>
</html>
