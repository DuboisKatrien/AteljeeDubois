<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoulColor – Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --card-bg: rgba(255, 255, 255, 0.85);
      --card-bg-soft: rgba(255, 255, 255, 0.7);
      --text-main: #4A4A4A;
      --accent-soft: #FFF7D1;
      --accent-soft-hover: #FFE9A3;
      --button-bg: #C8F3D6;
      --button-bg-hover: #B3EAC5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Poppins", sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-size: cover;
      background-position: center;
      background-image: url('https://raw.githubusercontent.com/DuboisKatrien/AteljeeDubois/main/Fotos_emoties/emojis.jpg');
      transition: background 0.6s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .page-wrapper {
      width: 100%;
      max-width: 960px;
      padding: 20px 16px 30px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .emoji-card,
    .chart-card {
      background: var(--card-bg);
      padding: 24px 28px;
      border-radius: 20px;
      box-shadow: 0 4px 25px rgba(0,0,0,0.1);
      backdrop-filter: blur(8px);
      width: 100%;
    }

    h2 {
      color: var(--text-main);
      margin: 0 0 15px;
      font-weight: 600;
      font-size: 1.4rem;
    }

    .emoji-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(55px, 1fr));
      gap: 12px;
      margin: 10px 0 5px;
    }

    .emoji {
      font-size: 40px;
      cursor: pointer;
      padding: 10px;
      border-radius: 15px;
      transition: 0.25s ease;
      background: var(--accent-soft);
      text-align: center;
    }

    .emoji:hover {
      transform: scale(1.12);
      background: var(--accent-soft-hover);
    }

    #quote {
      margin-top: 16px;
      font-size: 1.2rem;
      font-weight: 600;
      font-style: italic;
      color: #ffffff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      background: rgba(0,0,0,0.35);
      padding: 10px 14px;
      border-radius: 12px;
      display: inline-block;
    }

    #logout {
      margin-top: 18px;
      background: var(--button-bg);
      padding: 8px 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: 0.25s ease;
    }

    #logout:hover {
      background: var(--button-bg-hover);
      transform: scale(1.03);
    }

    .chart-card {
      background: var(--card-bg-soft);
    }

    canvas {
      margin-top: 16px;
      width: 100% !important;
      height: auto !important;
      max-height: 260px;
    }

    /* Desktop: kaarten naast elkaar */
    @media (min-width: 900px) {
      .page-wrapper {
        flex-direction: row;
        align-items: flex-start;
      }

      .emoji-card,
      .chart-card {
        width: 50%;
      }

      .emoji-card {
        margin-right: 10px;
      }

      .chart-card {
        margin-left: 10px;
      }
    }

    /* Mobiel / tablet */
    @media (max-width: 768px) {
      .page-wrapper {
        padding: 16px 12px 24px;
      }

      .emoji-card,
      .chart-card {
        padding: 18px 20px;
      }

      h2 {
        font-size: 1.2rem;
      }

      .emoji {
        font-size: 32px;
        padding: 8px;
      }

      #quote {
        font-size: 1.05rem;
        padding: 8px 12px;
      }

      #logout {
        font-size: 13px;
        padding: 6px 14px;
      }

      canvas {
        max-height: 220px;
      }
    }
  </style>
</head>

<body>
  <div class="page-wrapper">

    <!-- Emoties -->
    <div class="emoji-card">
      <h2>Hoe voel je je vandaag?</h2>

      <div class="emoji-container">
        <div class="emoji" onclick="selectEmotion('blij')">😀</div>
        <div class="emoji" onclick="selectEmotion('verdrietig')">😢</div>
        <div class="emoji" onclick="selectEmotion('boos')">
