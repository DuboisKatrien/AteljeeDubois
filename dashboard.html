<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoulColor – Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Poppins", sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #F7C8E0, #CDE7FF);
      transition: background 0.6s ease;
    }

    .card {
      background: rgba(255, 255, 255, 0.85);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 4px 25px rgba(0,0,0,0.1);
      width: 450px;
      text-align: center;
      backdrop-filter: blur(8px);
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      color: #4A4A4A;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .emoji-container {
      display: flex;
      justify-content: space-between;
      margin: 20px 0;
    }

    .emoji {
      font-size: 45px;
      cursor: pointer;
      padding: 12px;
      border-radius: 15px;
      transition: 0.3s ease;
      background: #FFF7D1;
    }

    .emoji:hover {
      transform: scale(1.15);
      background: #FFE9A3;
    }

    #quote {
      margin-top: 25px;
      font-size: 1.2rem;
      font-style: italic;
      color: #4A4A4A;
    }

    #logout {
      margin-top: 25px;
      background: #C8F3D6;
      padding: 10px 20px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: 0.3s ease;
    }

    #logout:hover {
      background: #B3EAC5;
      transform: scale(1.03);
    }

    canvas {
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Hoe voel je je vandaag?</h2>

    <div class="emoji-container">
      <div class="emoji" onclick="selectEmotion('blij')">😀</div>
      <div class="emoji" onclick="selectEmotion('verdrietig')">😢</div>
      <div class="emoji" onclick="selectEmotion('boos')">😡</div>
      <div class="emoji" onclick="selectEmotion('moe')">😴</div>
      <div class="emoji" onclick="selectEmotion('neutraal')">😐</div>
    </div>

    <div id="quote">Kies een emotie om je SoulColor te zien.</div>

    <canvas id="emotionChart" width="400" height="200"></canvas>

    <button id="logout" onclick="logout()">Uitloggen</button>
  </div>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Emotie- en grafieklogica -->
  <script>
    // Pastelkleuren voor achtergrond
    const emotionColors = {
      blij: "#FFE9A3",
      verdrietig: "#CDE7FF",
      boos: "#FFB3B3",
      moe: "#D8C7FF",
      neutraal: "#F0F0F0"
    };

    // Emotiewaarden voor grafiek
    const emotionValues = {
      blij: 5,
      boos: 4,
      neutraal: 3,
      moe: 2,
      verdrietig: 1
    };

    // Quote van de dag
    function loadQuote() {
      fetch("quotes.json")
        .then(res => res.json())
        .then(data => {
          const quotes = data.quotes;
          const today = new Date().getDate();
          document.getElementById("quote").innerText = quotes[today % quotes.length];
        })
        .catch(() => {
          document.getElementById("quote").innerText = "Vandaag is een nieuwe kans om te stralen.";
        });
    }

    loadQuote();

    // Emotie kiezen
    function selectEmotion(emotion) {
      document.body.style.background = emotionColors[emotion];
      loadQuote();

      let history = JSON.parse(localStorage.getItem("emotionHistory")) || [];
      history.push({
        date: new Date().toISOString().split("T")[0],
        emotion: emotion
      });
      localStorage.setItem("emotionHistory", JSON.stringify(history));

      drawEmotionChart();
    }

    // Grafiek tekenen
    function drawEmotionChart() {
      const history = JSON.parse(localStorage.getItem("emotionHistory")) || [];
      const ctx = document.getElementById("emotionChart").getContext("2d");

      if (history.length === 0) {
        ctx.font = "16px Poppins";
        ctx.fillStyle = "#4A4A4A";
        ctx.fillText("Nog geen emoties geregistreerd.", 50, 100);
        return;
      }

      const labels = history.map(entry => entry.date);
      const data = history.map(entry => emotionValues[entry.emotion]);
      const colors = history.map(entry => emotionColors[entry.emotion]);

      new Chart(ctx, {
        type: "line",
        data: {
          labels: labels,
          datasets: [{
            label: "Jouw SoulColor emoties",
            data: data,
            borderColor: "#F7C8E0",
            backgroundColor: colors,
            pointBackgroundColor: colors,
            pointRadius: 8,
            borderWidth: 3,
            tension: 0.4
          }]
        },
        options: {
          scales: {
            y: {
              min: 0,
              max: 6,
              ticks: {
                stepSize: 1,
                callback: function(value) {
                  return ["", "😢", "😴", "😐", "😡", "😀"][value];
                }
              }
            }
          },
          plugins: {
            legend: { display: false }
          }
        }
      });
    }

    function logout() {
      localStorage.removeItem("loggedInUser");
      window.location.href = "login.html";
    }

    drawEmotionChart();
  </script>

</body>
</html>
