<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoulColor – Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Poppins", sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-size: cover;
      background-position: center;
      background-image: url('https://raw.githubusercontent.com/DuboisKatrien/AteljeeDubois/main/Fotos_emoties/emojis.jpg');
      transition: background 0.6s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.85);
      padding: 25px 30px;
      border-radius: 20px;
      box-shadow: 0 4px 25px rgba(0,0,0,0.1);
      backdrop-filter: blur(8px);
      width: 90%;
      max-width: 420px;
    }

    h2 {
      color: #4A4A4A;
      margin-bottom: 15px;
      font-weight: 600;
    }

    /* ⭐ TERUG NAAR FLEX → ALTIJD WERKT */
    .emoji-container {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .emoji {
      font-size: 40px;
      cursor: pointer;
      padding: 10px;
      border-radius: 15px;
      background: #FFF7D1;
      transition: 0.3s ease;
      flex: 1 1 calc(20% - 10px);
      text-align: center;
    }

    .emoji:hover {
      transform: scale(1.15);
      background: #FFE9A3;
    }

    #quote {
      margin-top: 20px;
      font-size: 1.3rem;
      font-weight: 600;
      font-style: italic;
      color: #ffffff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      background: rgba(0,0,0,0.35);
      padding: 10px 15px;
      border-radius: 12px;
      display: inline-block;
    }

    #logout {
      margin-top: 15px;
      background: #C8F3D6;
      padding: 8px 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: 0.3s ease;
    }

    #logout:hover {
      background: #B3EAC5;
      transform: scale(1.03);
    }

    canvas {
      width: 100% !important;
      height: auto !important;
      max-height: 240px;
      margin-top: 20px;
    }

    /* 📱 Mobiel */
    @media (max-width: 768px) {
      .emoji {
        font-size: 32px;
        flex: 1 1 calc(33% - 10px);
      }

      #quote {
        font-size: 1.1rem;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Hoe voel je je vandaag?</h2>

    <div class="emoji-container">
      <div class="emoji" onclick="selectEmotion('blij')">😀</div>
      <div class="emoji" onclick="selectEmotion('verdrietig')">😢</div>
      <div class="emoji" onclick="selectEmotion('boos')">😡</div>
      <div class="emoji" onclick="selectEmotion('moe')">😴</div>
      <div class="emoji" onclick="selectEmotion('neutraal')">😐</div>
    </div>

    <div id="quote">Kies een emotie om je SoulColor te zien.</div>

    <button id="logout" onclick="logout()">Uitloggen</button>
  </div>

  <div class="card">
    <h2>Jouw SoulColor‑lijn</h2>
    <canvas id="emotionChart"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    const emotionImages = {
      blij: "https://raw.githubusercontent.com/DuboisKatrien/AteljeeDubois/main/Fotos_emoties/zon.jpg",
      verdrietig: "https://raw.githubusercontent.com/DuboisKatrien/AteljeeDubois/main/Fotos_emoties/regen.jpg",
      boos: "https://raw.githubusercontent.com/DuboisKatrien/AteljeeDubois/main/Fotos_emoties/donder.jpg",
      moe: "https://raw.githubusercontent.com/DuboisKatrien/AteljeeDubois/main/Fotos_emoties/moe.jpg",
      neutraal: "https://raw.githubusercontent.com/DuboisKatrien/AteljeeDubois/main/Fotos_emoties/neutraal.jpg"
    };

    const emotionValues = {
      blij: 5,
      boos: 4,
      neutraal: 3,
      moe: 2,
      verdrietig: 1
    };

    const user = JSON.parse(localStorage.getItem("loggedInUser"));
    const email = user.email;

    let chartInstance = null;

    function loadQuote() {
      fetch("quotes.json")
        .then(res => res.json())
        .then(data => {
          const quotes = data.quotes;
          const today = new Date().getDate();
          document.getElementById("quote").innerText = quotes[today % quotes.length];
        })
        .catch(() => {
          document.getElementById("quote").innerText = "Vandaag is een nieuwe kans om te stralen.";
        });
    }

    loadQuote();

    function selectEmotion(emotion) {
      document.body.style.background = `url('${emotionImages[emotion]}') center/cover no-repeat`;

      loadQuote();

      let history = JSON.parse(localStorage.getItem("emotionHistory_" + email)) || [];

      history.push({
        date: new Date().toISOString().split("T")[0],
        emotion: emotion
      });

      localStorage.setItem("emotionHistory_" + email, JSON.stringify(history));

      drawEmotionChart();
    }

    function drawEmotionChart() {
      const history = JSON.parse(localStorage.getItem("emotionHistory_" + email)) || [];
      const ctx = document.getElementById("emotionChart").getContext("2d");

      if (chartInstance) chartInstance.destroy();

      if (history.length === 0) {
        ctx.font = "16px Poppins";
        ctx.fillStyle = "#4A4A4A";
        ctx.fillText("Nog geen emoties geregistreerd.", 30, 60);
        return;
      }

      const labels = history.map(entry => entry.date);
      const data = history.map(entry => emotionValues[entry.emotion]);

      chartInstance = new Chart(ctx, {
        type: "line",
        data: {
          labels: labels,
          datasets: [{
            data: data,
            borderColor: "#ffffff",
            backgroundColor: "rgba(255,255,255,0.6)",
            pointBackgroundColor: "#ffffff",
            pointRadius: 6,
            borderWidth: 3,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false }},
          scales: {
            y: {
              min: 0,
              max: 6,
              ticks: {
                stepSize: 1,
                callback: value => ["", "😢", "😴", "😐", "😡", "😀"][value]
              }
            }
          }
        }
      });
    }

    function logout() {
      localStorage.removeItem("loggedInUser");
      window.location.href = "index.html";
    }

    drawEmotionChart();
  </script>

</body>
</html>
