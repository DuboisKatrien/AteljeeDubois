<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoulColor – Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Poppins", sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      background-size: cover;
      background-position: center;
      transition: background 0.6s ease;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }

    /* Kaart linksboven */
    .emoji-card {
      grid-column: 1 / 2;
      grid-row: 1 / 2;
      align-self: start;
      justify-self: start;
      background: rgba(255, 255, 255, 0.85);
      padding: 25px 35px;
      border-radius: 20px;
      box-shadow: 0 4px 25px rgba(0,0,0,0.1);
      backdrop-filter: blur(8px);
      margin: 30px;
    }

    /* Kaart rechtsbeneden */
    .chart-card {
      grid-column: 2 / 3;
      grid-row: 2 / 3;
      align-self: end;
      justify-self: end;
      background: rgba(255, 255, 255, 0.85);
      padding: 25px 35px;
      border-radius: 20px;
      box-shadow: 0 4px 25px rgba(0,0,0,0.1);
      backdrop-filter: blur(8px);
      margin: 30px;
    }

    h2 {
      color: #4A4A4A;
      margin-bottom: 15px;
      font-weight: 600;
    }

    .emoji-container {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
    }

    .emoji {
      font-size: 40px;
      cursor: pointer;
      padding: 10px;
      border-radius: 15px;
      transition: 0.3s ease;
      background: #FFF7D1;
    }

    .emoji:hover {
      transform: scale(1.15);
      background: #FFE9A3;
    }

    /* ⭐ Nieuwe opvallende quote */
    #quote {
      margin-top: 20px;
      font-size: 1.3rem;
      font-weight: 600;
      font-style: italic;
      color: #ffffff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      background: rgba(0,0,0,0.35);
      padding: 10px 15px;
      border-radius: 12px;
      display: inline-block;
    }

    #logout {
      margin-top: 15px;
      background: #C8F3D6;
      padding: 8px 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: 0.3s ease;
    }

    #logout:hover {
      background: #B3EAC5;
      transform: scale(1.03);
    }

    canvas {
      margin-top: 20px;
    }

    /* 📱 Mobiele versie */
    @media (max-width: 768px) {

      body {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        padding: 0;
      }

      .emoji-card,
      .chart-card {
        margin: 15px;
        padding: 15px 20px;
        width: auto;
        background: rgba(255, 255, 255, 0.65);
      }

      h2 {
        font-size: 1.2rem;
        margin-bottom: 10px;
      }

      .emoji {
        font-size: 32px;
        padding: 8px;
      }

      /* ⭐ Quote extra zichtbaar op gsm */
      #quote {
        font-size: 1.2rem;
        background: rgba(0,0,0,0.45);
        padding: 10px 15px;
        border-radius: 12px;
      }

      #logout {
        font-size: 13px;
        padding: 6px 14px;
      }

      canvas {
        height: 150px !important;
      }
    }
  </style>
</head>

<body>

  <!-- Emoties linksboven -->
  <div class="emoji-card">
    <h2>Hoe voel je je vandaag?</h2>

    <div class="emoji-container">
      <div class="emoji" onclick="selectEmotion('blij')">😀</div>
      <div class="emoji" onclick="selectEmotion('verdrietig')">😢</div>
      <div class="emoji" onclick="selectEmotion('boos')">😡</div>
      <div class="emoji" onclick="selectEmotion('moe')">😴</div>
      <div class="emoji" onclick="selectEmotion('neutraal')">😐</div>
    </div>

    <div id="quote">Kies een emotie om je SoulColor te zien.</div>

    <button id="logout" onclick="logout()">Uitloggen</button>
  </div>

  <!-- Grafiek rechtsbeneden -->
  <div class="chart-card">
    <canvas id="emotionChart" width="400" height="200"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    /* Foto's voor elke emotie */
    const emotionImages = {
      blij: "https://raw.githubusercontent.com/DuboisKatrien/AteljeeDubois/main/Fotos_emoties/zon.jpg",
      verdrietig: "https://raw.githubusercontent.com/DuboisKatrien/AteljeeDubois/main/Fotos_emoties/regen.jpg",
      boos: "https://raw.githubusercontent.com/DuboisKatrien/AteljeeDubois/main/Fotos_emoties/donder.jpg",
      moe: "https://raw.githubusercontent.com/DuboisKatrien/AteljeeDubois/main/Fotos_emoties/moe.jpg",
      neutraal: "https://raw.githubusercontent.com/DuboisKatrien/AteljeeDubois/main/Fotos_emoties/neutraal.jpg"
    };

    /* Emotiewaarden voor grafiek */
    const emotionValues = {
      blij: 5,
      boos: 4,
      neutraal: 3,
      moe: 2,
      verdrietig: 1
    };

    /* Ingelogde gebruiker ophalen */
    const user = JSON.parse(localStorage.getItem("loggedInUser"));
    const email = user.email;

    /* Quote van de dag */
    function loadQuote() {
      fetch("quotes.json")
        .then(res => res.json())
        .then(data => {
          const quotes = data.quotes;
          const today = new Date().getDate();
          document.getElementById("quote").innerText = quotes[today % quotes.length];
        })
        .catch(() => {
          document.getElementById("quote").innerText = "Vandaag is een nieuwe kans om te stralen.";
        });
    }

    loadQuote();

    /* Emotie kiezen */
    function selectEmotion(emotion) {
      document.body.style.background = `url('${emotionImages[emotion]}') center/cover no-repeat`;

      loadQuote();

      let history = JSON.parse(localStorage.getItem("emotionHistory_" + email)) || [];

      history.push({
        date: new Date().toISOString().split("T")[0],
        emotion: emotion
      });

      localStorage.setItem("emotionHistory_" + email, JSON.stringify(history));

      drawEmotionChart();
    }

    /* Grafiek tekenen */
    function drawEmotionChart() {
      const history = JSON.parse(localStorage.getItem("emotionHistory_" + email)) || [];
      const ctx = document.getElementById("emotionChart").getContext("2d");

      if (history.length === 0) {
        ctx.font = "16px Poppins";
        ctx.fillStyle = "#4A4A4A";
        ctx.fillText("Nog geen emoties geregistreerd.", 50, 100);
        return;
      }

      const labels = history.map(entry => entry.date);
      const data = history.map(entry => emotionValues[entry.emotion]);

      new Chart(ctx, {
        type: "line",
        data: {
          labels: labels,
          datasets: [{
            label: "Jouw SoulColor emoties",
            data: data,
            borderColor: "#ffffff",
            backgroundColor: "rgba(255,255,255,0.6)",
            pointBackgroundColor: "#ffffff",
            pointRadius: 8,
            borderWidth: 3,
            tension: 0.4
          }]
        },
        options: {
          scales: {
            y: {
              min: 0,
              max: 6,
              ticks: {
                stepSize: 1,
                callback: function(value) {
                  return ["", "😢", "😴", "😐", "😡", "😀"][value];
                }
              }
            }
          },
          plugins: {
            legend: { display: false }
          }
        }
      });
    }

    function logout() {
      localStorage.removeItem("loggedInUser");
      window.location.href = "index.html";
    }

    drawEmotionChart();
  </script>

</body>
</html>
