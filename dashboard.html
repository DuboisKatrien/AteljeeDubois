  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Emotie- en grafieklogica -->
  <script src="emotions.js"></script>

  <script>
    // Pastelkleuren voor achtergrond
    const emotionColors = {
      blij: "#FFE9A3",
      verdrietig: "#CDE7FF",
      boos: "#FFB3B3",
      moe: "#D8C7FF",
      neutraal: "#F0F0F0"
    };

    // Quote van de dag
    function loadQuote() {
      fetch("quotes.json")
        .then(res => res.json())
        .then(data => {
          const quotes = data.quotes;
          const today = new Date().getDate();
          document.getElementById("quote").innerText = quotes[today % quotes.length];
        })
        .catch(() => {
          document.getElementById("quote").innerText = "Vandaag is een nieuwe kans om te stralen.";
        });
    }

    loadQuote();

    // Emotie kiezen
    function selectEmotion(emotion) {
      document.body.style.background = emotionColors[emotion];
      loadQuote();

      let history = JSON.parse(localStorage.getItem("emotionHistory")) || [];
      history.push({
        date: new Date().toISOString().split("T")[0],
        emotion: emotion
      });
      localStorage.setItem("emotionHistory", JSON.stringify(history));

      drawEmotionChart();
    }

    function logout() {
      localStorage.removeItem("loggedInUser");
      window.location.href = "login.html";
    }

    // Grafiek tonen bij laden
    drawEmotionChart();
  </script>
</body>
</html>
